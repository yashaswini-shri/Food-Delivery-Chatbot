The error is very clear: Hugging Face is rejecting the secret because the value is null.

✅ Root Cause
This line:

GROQ_KEY = os.getenv("GROQ_KEY")
is returning:

None
Then this gets passed here:

api.add_space_secret(
    repo_id=repo_id,
    key="GROQ_KEY",
    value=GROQ_KEY
)
So Hugging Face receives:

"value": null
and throws:

Invalid input: expected string, received null

✅ Why os.getenv("GROQ_KEY") is None
You're running this inside GitHub Actions.

That means GROQ_KEY must be added in GitHub Secrets.

If it is not added, Python gets:

None
✅ Fix Step-by-Step
🔹 Step 1: Add GROQ_KEY in GitHub Secrets
Go to:

GitHub Repository Settings Secrets Page

Then:

Your Repo → Settings → Secrets and variables → Actions
Add:

Name	Value
GROQ_KEY	your actual Groq API key
🔹 Step 2: Use It in GitHub Workflow
Inside .github/workflows/deploy.yml

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  GROQ_KEY: ${{ secrets.GROQ_KEY }}
Example:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GROQ_KEY: ${{ secrets.GROQ_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install huggingface_hub

      - name: Deploy
        run: python fooddelivery/hosting/hosting.py
